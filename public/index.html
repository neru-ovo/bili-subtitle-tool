<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站字幕获取工具</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>B站字幕获取工具</h1>
      <p class="subtitle">输入B站视频链接，获取字幕文本</p>
      <div id="statusBar" class="status-bar"></div>
    </header>

    <section class="input-section">
      <input type="text" id="urlInput" placeholder="粘贴B站视频链接，例如 https://www.bilibili.com/video/BV1xx411c79H" />
      <button id="processBtn" onclick="process()">获取字幕</button>
    </section>

    <section id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p id="statusText">正在获取字幕...</p>
    </section>

    <section id="result" class="result hidden">
      <div class="meta">
        <span id="videoTitle"></span>
        <span id="subtitleSource"></span>
        <span id="charCount"></span>
      </div>
      <div class="toolbar">
        <button onclick="downloadTxt()">下载 .txt 文件</button>
        <button onclick="copyText()">复制全文</button>
      </div>
      <div id="subtitleContent" class="content-box"></div>
    </section>

    <section id="error" class="error hidden">
      <p id="errorText"></p>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
